<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      height: 100vh;
      overflow: hidden;
      background: #e8eaed;
    }
    .app {
      display: grid;
      grid-template-columns: 160px 1fr 240px;
      grid-template-rows: 44px 1fr;
      height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      background: #1e293b;
      color: #f8fafc;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid #0f172a;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header .hint {
      color: #94a3b8;
      font-size: 12px;
      margin-left: auto;
    }
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .zoom-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #334155;
      color: #f8fafc;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }
    .zoom-controls button:hover { background: #475569; }
    .zoom-controls .zoom-label {
      min-width: 44px;
      text-align: center;
      font-size: 12px;
      color: #cbd5e1;
    }
    .sidebar {
      background: #f8fafc;
      border-right: 1px solid #cbd5e1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar h2, .props h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      padding: 12px 12px 6px;
      font-weight: 600;
    }
    .palette {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px 12px;
    }
    .palette-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #fff;
      cursor: grab;
      text-align: left;
      font: inherit;
      color: inherit;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      transition: border-color 0.12s, background 0.12s;
    }
    .palette-btn:active { cursor: grabbing; }
    .palette-btn:hover { border-color: #94a3b8; background: #f1f5f9; }
    .palette-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 1px #2563eb;
    }
    .palette-btn .icon-wrap {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .palette-btn .icon-wrap svg { width: 28px; height: 28px; }
    .tools {
      padding: 0 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid #e2e8f0;
      margin-top: 4px;
      padding-top: 12px;
    }
    .tool-btn {
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 500;
      color: #334155;
      text-align: left;
      transition: background 0.12s, border-color 0.12s;
    }
    .tool-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
    .tool-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    .tool-btn.danger:hover { background: #fef2f2; border-color: #f87171; color: #b91c1c; }
    .tool-btn.export {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      margin-top: 8px;
    }
    .tool-btn.export:hover { background: #0d9488; border-color: #0d9488; }
    .tool-btn.export + .tool-btn.export { margin-top: 4px; }
    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(90deg, #e2e8f0 1px, transparent 1px),
        linear-gradient(#e2e8f0 1px, transparent 1px);
      background-size: 20px 20px;
      background-color: #fff;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: default;
    }
    #canvas.mode-place { cursor: crosshair; }
    #canvas.mode-connect { cursor: cell; }
    #canvas.mode-pan { cursor: grab; }
    #canvas.mode-pan.panning { cursor: grabbing; }
    .node-group { cursor: grab; }
    .node-group:active { cursor: grabbing; }
    .node-group.selected .node-body {
      stroke: #2563eb;
      stroke-width: 2.5;
    }
    .node-group.selected .node-hit {
      stroke: #2563eb;
      stroke-opacity: 0.35;
    }
    .flame-group { cursor: grab; }
    .flame-group:active { cursor: grabbing; }
    .flame-group.selected .node-body {
      stroke: #2563eb !important;
      stroke-width: 2.5;
      stroke-dasharray: none;
    }
    .link-line {
      stroke: #475569;
      stroke-width: 2;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
    }
    .link-line.selected {
      stroke: #2563eb;
      stroke-width: 3;
    }
    .link-hit {
      stroke: transparent;
      stroke-width: 12;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
    }
    .link-handle {
      fill: #fff;
      stroke: #2563eb;
      stroke-width: 2;
      cursor: grab;
      pointer-events: all;
    }
    .link-handle:active {
      cursor: grabbing;
    }
    .props {
      background: #f8fafc;
      border-left: 1px solid #cbd5e1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .props-body {
      padding: 0 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .props-body.empty {
      color: #94a3b8;
      font-size: 12px;
      padding-top: 4px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
      color: #1e293b;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .field textarea { min-height: 100px; }
    .field textarea.label-area { min-height: 72px; }
    .field textarea.cells-area { min-height: 120px; font-family: ui-monospace, monospace; font-size: 12px; }
    .field .meta {
      font-size: 12px;
      color: #64748b;
      padding: 4px 0;
    }
    .field .row {
      display: flex;
      gap: 8px;
    }
    .field .row > * { flex: 1; min-width: 0; }
    .field button {
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      color: #1e293b;
    }
    .field button:hover { background: #f1f5f9; }
    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px #cbd5e1;
      cursor: pointer;
      padding: 0;
    }
    .color-swatch.active {
      box-shadow: 0 0 0 2px #2563eb;
    }
    .status-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.9);
      color: #e2e8f0;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 5;
    }
    .status-bar.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Network Diagram</h1>
      <div class="zoom-controls">
        <button type="button" id="btnZoomOut" title="Zoom out">−</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button type="button" id="btnZoomIn" title="Zoom in">+</button>
        <button type="button" id="btnZoomReset" title="Reset zoom">⌂</button>
      </div>
      <span class="hint" id="modeHint">Select mode — drag palette items, wheel zoom, middle-drag pan</span>
    </header>

    <aside class="sidebar">
      <h2>Devices</h2>
      <div class="palette" id="palette"></div>
      <h2>Tools</h2>
      <div class="tools">
        <button type="button" class="tool-btn active" data-tool="select" id="btnSelect">Select / Move</button>
        <button type="button" class="tool-btn" data-tool="connect" id="btnConnect">Connect</button>
        <button type="button" class="tool-btn danger" id="btnDelete">Delete</button>
        <button type="button" class="tool-btn" id="btnSave">Save JSON</button>
        <button type="button" class="tool-btn" id="btnLoad">Load JSON</button>
        <button type="button" class="tool-btn export" id="btnExportPng">Export PNG</button>
        <button type="button" class="tool-btn export" id="btnExportPdf">Export PDF</button>
        <input type="file" id="fileLoad" accept=".json,application/json" hidden />
      </div>
    </aside>

    <main class="canvas-wrap" id="canvasWrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <defs id="iconDefs"></defs>
        <g id="world">
          <g id="flamesLayer"></g>
          <g id="linksLayer"></g>
          <g id="nodesLayer"></g>
        </g>
      </svg>
      <div class="status-bar" id="statusBar"></div>
    </main>

    <aside class="props">
      <h2>Properties</h2>
      <div class="props-body empty" id="propsBody">Select a device or textbox</div>
    </aside>
  </div>

  <script>
    const DEVICE_TYPES = [
      { type: "server", label: "Server" },
      { type: "cloud", label: "Cloud" },
      { type: "pc", label: "PC" },
      { type: "router", label: "Router" },
      { type: "switch", label: "Switch" },
      { type: "loadbalancer", label: "Load Balancer" },
      { type: "firewall", label: "Firewall" },
      { type: "textbox", label: "Textbox" },
      { type: "table", label: "Table" },
      { type: "flame", label: "Frame" },
    ];

    const FRAME_COLORS = [
      { id: "orange", stroke: "#f97316", fill: "rgba(255, 237, 213, 0.55)", title: "#c2410c", titleBg: "rgba(255, 247, 237, 0.9)" },
      { id: "blue", stroke: "#3b82f6", fill: "rgba(219, 234, 254, 0.55)", title: "#1d4ed8", titleBg: "rgba(239, 246, 255, 0.9)" },
      { id: "green", stroke: "#22c55e", fill: "rgba(220, 252, 231, 0.55)", title: "#15803d", titleBg: "rgba(240, 253, 244, 0.9)" },
      { id: "purple", stroke: "#a855f7", fill: "rgba(243, 232, 255, 0.55)", title: "#7e22ce", titleBg: "rgba(250, 245, 255, 0.9)" },
      { id: "red", stroke: "#ef4444", fill: "rgba(254, 226, 226, 0.55)", title: "#b91c1c", titleBg: "rgba(254, 242, 242, 0.9)" },
      { id: "slate", stroke: "#64748b", fill: "rgba(241, 245, 249, 0.7)", title: "#334155", titleBg: "rgba(248, 250, 252, 0.95)" },
      { id: "teal", stroke: "#14b8a6", fill: "rgba(204, 251, 241, 0.55)", title: "#0f766e", titleBg: "rgba(240, 253, 250, 0.9)" },
      { id: "amber", stroke: "#d97706", fill: "rgba(254, 243, 199, 0.55)", title: "#b45309", titleBg: "rgba(255, 251, 235, 0.9)" },
    ];

    const NODE_W = 88;
    const NODE_H = 72;
    const TEXT_PAD_X = 12;
    const TEXT_PAD_Y = 10;
    const TEXT_LINE_H = 16;
    const TEXT_FONT = "12px sans-serif";
    const TEXT_MIN_W = 80;
    const TEXT_MIN_H = 36;
    const TEXT_MAX_W = 280;
    const FLAME_MIN_W = 200;
    const FLAME_MIN_H = 140;
    const FLAME_PAD = 24;
    const FLAME_TITLE_H = 22;
    const TABLE_CELL_W = 72;
    const TABLE_CELL_H = 28;
    const TABLE_PAD = 8;
    const TABLE_MIN_DIM = 1;
    const TABLE_MAX_DIM = 20;
    const VIEW_MIN = 0.25;
    const VIEW_MAX = 3;

    const measureCtx = document.createElement("canvas").getContext("2d");

    const state = {
      nodes: [],
      links: [],
      selectedNodes: new Set(),
      selectedLinks: new Set(),
      mode: "select",
      placeType: null,
      connectFrom: null,
      drag: null,
      curveDrag: null,
      pan: null,
      spaceDown: false,
      nextId: 1,
      view: { x: 0, y: 0, scale: 1 },
    };

    const canvas = document.getElementById("canvas");
    const canvasWrap = document.getElementById("canvasWrap");
    const world = document.getElementById("world");
    const flamesLayer = document.getElementById("flamesLayer");
    const nodesLayer = document.getElementById("nodesLayer");
    const linksLayer = document.getElementById("linksLayer");
    const propsBody = document.getElementById("propsBody");
    const modeHint = document.getElementById("modeHint");
    const statusBar = document.getElementById("statusBar");
    const zoomLabel = document.getElementById("zoomLabel");

    function uid() {
      return "n" + state.nextId++;
    }

    function showStatus(msg, ms = 2200) {
      statusBar.textContent = msg;
      statusBar.classList.add("show");
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => statusBar.classList.remove("show"), ms);
    }

    function setMode(mode, placeType = null) {
      state.mode = mode;
      state.placeType = placeType;
      state.connectFrom = null;
      canvas.classList.toggle("mode-place", mode === "place");
      canvas.classList.toggle("mode-connect", mode === "connect");
      updateCursor();

      document.querySelectorAll(".palette-btn").forEach((b) => {
        b.classList.toggle("active", mode === "place" && b.dataset.type === placeType);
      });
      document.querySelectorAll(".tool-btn[data-tool]").forEach((b) => {
        b.classList.toggle("active", b.dataset.tool === mode);
      });

      if (mode === "select") modeHint.textContent = "Select mode — drag palette items, wheel zoom, middle-drag / Space+drag pan";
      else if (mode === "place") modeHint.textContent = `Place ${labelFor(placeType)} — click or drop on canvas`;
      else if (mode === "connect") modeHint.textContent = "Connect mode — click first device, then second";
    }

    function updateCursor() {
      const panning = !!state.pan || state.spaceDown;
      canvas.classList.toggle("mode-pan", panning && state.mode === "select");
      canvas.classList.toggle("panning", !!state.pan);
    }

    function labelFor(type) {
      return DEVICE_TYPES.find((d) => d.type === type)?.label || type;
    }

    function isModClick(e) {
      return e.shiftKey || e.metaKey || e.ctrlKey;
    }

    function isFlame(node) {
      return node && node.type === "flame";
    }

    function isTable(node) {
      return node && node.type === "table";
    }

    function isConnectable(node) {
      return node && node.type !== "flame";
    }

    function frameColor(node) {
      const id = (node && node.color) || "orange";
      return FRAME_COLORS.find((c) => c.id === id) || FRAME_COLORS[0];
    }

    function clampTableDim(n, fallback) {
      const v = Number(n);
      if (!Number.isFinite(v)) return fallback;
      return Math.max(TABLE_MIN_DIM, Math.min(TABLE_MAX_DIM, Math.round(v)));
    }

    function makeEmptyCells(rows, cols) {
      return Array.from({ length: rows }, () => Array.from({ length: cols }, () => ""));
    }

    function normalizeCells(cells, rows, cols) {
      const out = makeEmptyCells(rows, cols);
      if (!Array.isArray(cells)) return out;
      for (let r = 0; r < rows; r++) {
        const row = Array.isArray(cells[r]) ? cells[r] : [];
        for (let c = 0; c < cols; c++) {
          out[r][c] = row[c] != null ? String(row[c]) : "";
        }
      }
      return out;
    }

    function measureTable(node) {
      const rows = clampTableDim(node.rows, 3);
      const cols = clampTableDim(node.cols, 3);
      const w = Math.max(NODE_W, cols * TABLE_CELL_W + TABLE_PAD * 2);
      const h = Math.max(NODE_H, rows * TABLE_CELL_H + TABLE_PAD * 2 + 18);
      return { w, h, rows, cols };
    }

    function wrapTextLines(text, maxInnerW) {
      measureCtx.font = TEXT_FONT;
      const raw = String(text || "Text").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const paragraphs = raw.split("\n");
      const lines = [];
      for (const para of paragraphs) {
        if (para === "") {
          lines.push("");
          continue;
        }
        const words = para.split(/(\s+)/);
        let current = "";
        for (const word of words) {
          const test = current + word;
          if (measureCtx.measureText(test).width <= maxInnerW || current === "") {
            current = test;
          } else {
            lines.push(current.replace(/\s+$/, ""));
            current = word.replace(/^\s+/, "");
          }
        }
        if (current !== "" || words.length === 0) lines.push(current.replace(/\s+$/, ""));
      }
      return lines.length ? lines : [""];
    }

    function measureTextbox(label) {
      measureCtx.font = TEXT_FONT;
      const maxInner = TEXT_MAX_W - TEXT_PAD_X * 2;
      const lines = wrapTextLines(label, maxInner);
      let maxLineW = 0;
      for (const line of lines) {
        maxLineW = Math.max(maxLineW, measureCtx.measureText(line || " ").width);
      }
      const w = Math.max(TEXT_MIN_W, Math.min(TEXT_MAX_W, Math.ceil(maxLineW + TEXT_PAD_X * 2)));
      const h = Math.max(TEXT_MIN_H, Math.ceil(lines.length * TEXT_LINE_H + TEXT_PAD_Y * 2));
      return { w, h, lines };
    }

    function contentSize(node) {
      if (node.type === "textbox") {
        const m = measureTextbox(node.label);
        return { w: m.w, h: m.h };
      }
      if (node.type === "flame") {
        return {
          w: node.w != null ? node.w : FLAME_MIN_W,
          h: node.h != null ? node.h : FLAME_MIN_H,
        };
      }
      if (node.type === "table") {
        const m = measureTable(node);
        return { w: m.w, h: m.h };
      }
      return { w: NODE_W, h: NODE_H };
    }

    function nodeSize(node) {
      return contentSize(node);
    }

    function nodeCenter(node) {
      const { w, h } = nodeSize(node);
      return { x: node.x + w / 2, y: node.y + h / 2 };
    }

    function nodeBounds(node) {
      const { w, h } = nodeSize(node);
      return { x: node.x, y: node.y, w, h, x2: node.x + w, y2: node.y + h };
    }

    function findNode(id) {
      return state.nodes.find((n) => n.id === id);
    }

    function findLink(id) {
      return state.links.find((l) => l.id === id);
    }

    function hasSelection() {
      return state.selectedNodes.size > 0 || state.selectedLinks.size > 0;
    }

    function contentNodes() {
      return state.nodes.filter((n) => n.type !== "flame");
    }

    function flameNodes() {
      return state.nodes.filter((n) => n.type === "flame");
    }

    function pointInFlame(cx, cy, flame) {
      const b = nodeBounds(flame);
      return cx >= b.x && cx <= b.x2 && cy >= b.y && cy <= b.y2;
    }

    function membersOfFlame(flame) {
      return contentNodes().filter((n) => {
        const c = nodeCenter(n);
        return pointInFlame(c.x, c.y, flame);
      });
    }

    function flameArea(flame) {
      const { w, h } = nodeSize(flame);
      return w * h;
    }

    function membershipMap() {
      const map = new Map();
      const flames = flameNodes();
      for (const n of contentNodes()) {
        const c = nodeCenter(n);
        let best = null;
        let bestArea = Infinity;
        for (const f of flames) {
          if (!pointInFlame(c.x, c.y, f)) continue;
          const area = flameArea(f);
          if (area < bestArea) {
            bestArea = area;
            best = f;
          }
        }
        if (best) {
          if (!map.has(best.id)) map.set(best.id, []);
          map.get(best.id).push(n);
        }
      }
      return map;
    }

    function layoutFlames() {
      for (let pass = 0; pass < 2; pass++) {
        const membership = membershipMap();
        for (const flame of flameNodes()) {
          const members = membership.get(flame.id) || [];
          if (members.length === 0) {
            flame.w = flame.w != null ? Math.max(flame.w, FLAME_MIN_W) : FLAME_MIN_W;
            flame.h = flame.h != null ? Math.max(flame.h, FLAME_MIN_H) : FLAME_MIN_H;
            if (flame.w < FLAME_MIN_W) flame.w = FLAME_MIN_W;
            if (flame.h < FLAME_MIN_H) flame.h = FLAME_MIN_H;
            continue;
          }
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          for (const m of members) {
            const b = nodeBounds(m);
            minX = Math.min(minX, b.x);
            minY = Math.min(minY, b.y);
            maxX = Math.max(maxX, b.x2);
            maxY = Math.max(maxY, b.y2);
          }
          flame.x = minX - FLAME_PAD;
          flame.y = minY - FLAME_PAD - FLAME_TITLE_H;
          flame.w = Math.max(FLAME_MIN_W, maxX - minX + FLAME_PAD * 2);
          flame.h = Math.max(FLAME_MIN_H, maxY - minY + FLAME_PAD * 2 + FLAME_TITLE_H);
        }
      }
    }

    function collectDragIds(primaryId) {
      const ids = new Set(
        state.selectedNodes.has(primaryId) ? [...state.selectedNodes] : [primaryId]
      );
      const membership = membershipMap();
      for (const id of [...ids]) {
        const n = findNode(id);
        if (isFlame(n)) {
          const members = membership.get(id) || membersOfFlame(n);
          for (const m of members) ids.add(m.id);
        }
      }
      return [...ids];
    }

    // --- View / pan / zoom ---
    function applyView() {
      world.setAttribute(
        "transform",

      );

      canvasWrap.style.backgroundSize = `${size}px ${size}px`;
      canvasWrap.style.backgroundPosition = `${state.view.x}px ${state.view.y}px`;
      zoomLabel.textContent = Math.round(state.view.scale * 100) + "%";
    }

    function zoomAt(screenX, screenY, newScale) {
      const old = state.view.scale;
      const scale = Math.min(VIEW_MAX, Math.max(VIEW_MIN, newScale));
      if (scale === old) return;
      state.view.x = screenX - ((screenX - state.view.x) * scale) / old;
      state.view.y = screenY - ((screenY - state.view.y) * scale) / old;
      state.view.scale = scale;
      applyView();
    }

    function zoomBy(factor) {
      const rect = canvas.getBoundingClientRect();
      zoomAt(rect.width / 2, rect.height / 2, state.view.scale * factor);
    }

    function resetView() {
      state.view = { x: 0, y: 0, scale: 1 };
      applyView();
    }

      const temp = { type, label, rows, cols, w: FLAME_MIN_W, h: FLAME_MIN_H };

      const node = {
        id: uid(),
        type,

        node.rows = rows;
        node.cols = cols;
        node.cells = makeEmptyCells(rows, cols);
      }
      state.nodes.push(node);
      return node;

    /** Point on node rectangle edge in the direction of (towardX, towardY). */
    function boundaryPoint(node, towardX, towardY, outward = 0) {
      const b = nodeBounds(node);
      const cx = b.x + b.w / 2;
      const cy = b.y + b.h / 2;
      const dx = towardX - cx;
      const dy = towardY - cy;
      if (dx === 0 && dy === 0) return { x: cx, y: cy };
      const hw = b.w / 2;
      const hh = b.h / 2;
      const sx = Math.abs(dx) / (hw || 1);
      const sy = Math.abs(dy) / (hh || 1);
      const s = Math.max(sx, sy) || 1;
      const len = Math.hypot(dx, dy) || 1;
      const ux = dx / len;
      const uy = dy / len;
      return {
        x: cx + dx / s + ux * outward,
        y: cy + dy / s + uy * outward,
      };
    }

    const HOP_R = 7;
    const HOP_SKIP = 10;
    const CURVE_SAMPLES = 16;

    function normalizeCurve(c) {
      if (!c || typeof c.x !== "number" || typeof c.y !== "number") return null;
      if (!Number.isFinite(c.x) || !Number.isFinite(c.y)) return null;
      return { x: c.x, y: c.y };
    }

    function linkEndpoints(link) {
      const a = findNode(link.from);
      const b = findNode(link.to);
      if (!a || !b || isFlame(a) || isFlame(b)) return null;
      const curve = normalizeCurve(link.curve);
      let p1, p2;
      if (curve) {
        p1 = boundaryPoint(a, curve.x, curve.y, 1.5);
        p2 = boundaryPoint(b, curve.x, curve.y, 1.5);
      } else {
        const ca = nodeCenter(a);
        const cb = nodeCenter(b);
        p1 = boundaryPoint(a, cb.x, cb.y, 1.5);
        p2 = boundaryPoint(b, ca.x, ca.y, 1.5);
      }
      return { p1, p2, curve };
    }

    function quadPoint(p1, c, p2, t) {
      const u = 1 - t;
      return {
        x: u * u * p1.x + 2 * u * t * c.x + t * t * p2.x,
        y: u * u * p1.y + 2 * u * t * c.y + t * t * p2.y,
      };
    }

    function midHandlePoint(p1, p2, curve) {
      if (curve) return quadPoint(p1, curve, p2, 0.5);
      return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
    }

    /** Control point so the curve passes through handle at t=0.5 */
    function curveFromHandle(p1, p2, handle) {
      return {
        x: 2 * handle.x - 0.5 * p1.x - 0.5 * p2.x,
        y: 2 * handle.y - 0.5 * p1.y - 0.5 * p2.y,
      };
    }

    function sampleLink(p1, p2, curve, n = CURVE_SAMPLES) {
      const pts = [];
      if (curve) {
        for (let i = 0; i <= n; i++) pts.push(quadPoint(p1, curve, p2, i / n));
      } else {
        pts.push({ x: p1.x, y: p1.y }, { x: p2.x, y: p2.y });
      }
      return pts;
    }

    function polylineLen(pts) {
      let len = 0;
      for (let i = 1; i < pts.length; i++) {
        len += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
      }
      return len;
    }

    function pointAtDistance(pts, dist) {
      if (pts.length < 2) return { x: pts[0]?.x || 0, y: pts[0]?.y || 0, tx: 1, ty: 0 };
      let rem = Math.max(0, dist);
      for (let i = 1; i < pts.length; i++) {
        const dx = pts[i].x - pts[i - 1].x;
        const dy = pts[i].y - pts[i - 1].y;
        const seg = Math.hypot(dx, dy) || 1e-9;
        if (rem <= seg) {
          const t = rem / seg;
          const len = Math.hypot(dx, dy) || 1;
          return {
            x: pts[i - 1].x + dx * t,
            y: pts[i - 1].y + dy * t,
            tx: dx / len,
            ty: dy / len,
          };
        }
        rem -= seg;
      }
      const last = pts[pts.length - 1];
      const prev = pts[pts.length - 2];
      const dx = last.x - prev.x;
      const dy = last.y - prev.y;
      const len = Math.hypot(dx, dy) || 1;
      return { x: last.x, y: last.y, tx: dx / len, ty: dy / len };
    }

    function segmentsIntersect(a1, a2, b1, b2) {
      const dax = a2.x - a1.x;
      const day = a2.y - a1.y;
      const dbx = b2.x - b1.x;
      const dby = b2.y - b1.y;
      const den = dax * dby - day * dbx;
      if (Math.abs(den) < 1e-9) return null;
      const t = ((b1.x - a1.x) * dby - (b1.y - a1.y) * dbx) / den;
      const u = ((b1.x - a1.x) * day - (b1.y - a1.y) * dax) / den;
      if (t <= 0.02 || t >= 0.98 || u <= 0.02 || u >= 0.98) return null;
      return {
        x: a1.x + t * dax,
        y: a1.y + t * day,
        t,
        u,
      };
    }

    function distAlongPolyline(pts, point) {
      let best = 0;
      let bestD = Infinity;
      let acc = 0;
      for (let i = 1; i < pts.length; i++) {
        const a = pts[i - 1];
        const b = pts[i];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const seg = Math.hypot(dx, dy) || 1e-9;
        let t = ((point.x - a.x) * dx + (point.y - a.y) * dy) / (seg * seg);
        t = Math.max(0, Math.min(1, t));
        const px = a.x + t * dx;
        const py = a.y + t * dy;
        const d = Math.hypot(point.x - px, point.y - py);
        if (d < bestD) {
          bestD = d;
          best = acc + t * seg;
        }
        acc += seg;
      }
      return best;
    }

    function linksShareNode(a, b) {
      return a.from === b.from || a.from === b.to || a.to === b.from || a.to === b.to;
    }

    function findAllHops(geoms) {
      /** @type {Map<string, number[]>} linkId -> distances along path */
      const hops = new Map();
      for (const g of geoms) hops.set(g.link.id, []);

      for (let i = 0; i < geoms.length; i++) {
        for (let j = i + 1; j < geoms.length; j++) {
          const A = geoms[i];
          const B = geoms[j];
          if (linksShareNode(A.link, B.link)) continue;

          const hopper = A.link.id > B.link.id ? A : B;
          const under = hopper === A ? B : A;

          for (let si = 1; si < hopper.pts.length; si++) {
            for (let sj = 1; sj < under.pts.length; sj++) {
              const hit = segmentsIntersect(
                hopper.pts[si - 1],
                hopper.pts[si],
                under.pts[sj - 1],
                under.pts[sj]
              );
              if (!hit) continue;
              const d = distAlongPolyline(hopper.pts, hit);
              const total = hopper.len;
              if (d < HOP_SKIP || d > total - HOP_SKIP) continue;
              hops.get(hopper.link.id).push(d);
            }
          }
        }
      }

      for (const [id, arr] of hops) {
        arr.sort((a, b) => a - b);
        const merged = [];
        for (const d of arr) {
          if (!merged.length || d - merged[merged.length - 1] > HOP_R * 2.5) merged.push(d);
        }
        hops.set(id, merged);
      }
      return hops;
    }

    function pathDWithHops(pts, hopDists) {
      if (!pts.length) return "";
      if (!hopDists.length) {
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
        return d;
      }

      const total = polylineLen(pts);
      const sorted = hopDists.filter((d) => d > HOP_SKIP && d < total - HOP_SKIP).sort((a, b) => a - b);
      if (!sorted.length) {
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
        return d;
      }

      let d = `M ${pts[0].x} ${pts[0].y}`;
      let cursor = 0;
      const step = 2;

      for (const hop of sorted) {
        const enter = hop - HOP_R;
        const leave = hop + HOP_R;
        while (cursor + step < enter) {
          cursor += step;
          const p = pointAtDistance(pts, cursor);
          d += ` L ${p.x} ${p.y}`;
        }
        const pEnter = pointAtDistance(pts, Math.max(0, enter));
        const pMid = pointAtDistance(pts, hop);
        const pLeave = pointAtDistance(pts, Math.min(total, leave));
        d += ` L ${pEnter.x} ${pEnter.y}`;
        // Semicircle hop: sweep perpendicular to tangent (left side)
        const nx = -pMid.ty;
        const ny = pMid.tx;
        const apexX = pMid.x + nx * HOP_R;
        const apexY = pMid.y + ny * HOP_R;
        d += ` Q ${apexX} ${apexY} ${pLeave.x} ${pLeave.y}`;
        cursor = leave;
      }

      while (cursor + step < total) {
        cursor += step;
        const p = pointAtDistance(pts, cursor);
        d += ` L ${p.x} ${p.y}`;
      }
      const end = pts[pts.length - 1];
      d += ` L ${end.x} ${end.y}`;
      return d;
    }

    function simplePathD(p1, p2, curve) {
      if (curve) return `M ${p1.x} ${p1.y} Q ${curve.x} ${curve.y} ${p2.x} ${p2.y}`;
      return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
    }

    function renderLinks() {
      linksLayer.innerHTML = "";

      const geoms = [];
      for (const link of state.links) {
        const ep = linkEndpoints(link);
        if (!ep) continue;
        const pts = sampleLink(ep.p1, ep.p2, ep.curve);
        geoms.push({
          link,
          p1: ep.p1,
          p2: ep.p2,
          curve: ep.curve,
          pts,
          len: polylineLen(pts),
        });
      }

      const hopsMap = findAllHops(geoms);

      for (const g of geoms) {
        const { link, p1, p2, curve, pts } = g;
        const selected = state.selectedLinks.has(link.id);
        const lineStyle = link.lineStyle === "dotted" ? "dotted" : "solid";
        const arrow = link.arrow === "end" || link.arrow === "both" ? link.arrow : "none";
        const hopDists = hopsMap.get(link.id) || [];
        const d =
          hopDists.length > 0 ? pathDWithHops(pts, hopDists) : simplePathD(p1, p2, curve);
        const hitD = simplePathD(p1, p2, curve);

        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.dataset.id = link.id;

        const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
        hit.setAttribute("d", hitD);
        hit.setAttribute("class", "link-hit");

        const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
        line.setAttribute("d", d);
        line.setAttribute("class", "link-line" + (selected ? " selected" : ""));
        if (lineStyle === "dotted") line.setAttribute("stroke-dasharray", "6 4");
        if (arrow === "end" || arrow === "both") {
          line.setAttribute("marker-end", selected ? "url(#arrow-end-sel)" : "url(#arrow-end)");
        }
        if (arrow === "both") {
          line.setAttribute("marker-start", selected ? "url(#arrow-start-sel)" : "url(#arrow-start)");
        }

        group.appendChild(hit);
        group.appendChild(line);

        const onSelect = (e) => {
          e.stopPropagation();
          e.preventDefault();
          if (state.mode === "connect") return;
          selectLink(link.id, isModClick(e));
        };
        hit.addEventListener("mousedown", onSelect);
        line.addEventListener("mousedown", onSelect);

        if (selected && state.selectedLinks.size === 1 && state.mode !== "connect") {
          const handlePt = midHandlePoint(p1, p2, curve);
          const handle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          handle.setAttribute("class", "link-handle");
          handle.setAttribute("cx", handlePt.x);
          handle.setAttribute("cy", handlePt.y);
          handle.setAttribute("r", 6);
          handle.addEventListener("mousedown", (e) => {
            e.stopPropagation();
            e.preventDefault();
            if (e.button !== 0) return;
            const p = svgPoint(e);
            state.curveDrag = {
              linkId: link.id,
              // store handle position; convert to control on move
              startHandle: { x: handlePt.x, y: handlePt.y },
              origin: { x: p.x, y: p.y },
            };
          });
          handle.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            e.preventDefault();
            link.curve = null;
            renderVisualOnly();
            showStatus("Link straightened");
          });
          group.appendChild(handle);
        }

        linksLayer.appendChild(group);
      }
    }

    function truncate(str, n) {
      if (!str) return "";
      return str.length > n ? str.slice(0, n - 1) + "…" : str;
    }

    function renderTableNode(g, node, w, h) {
      const rows = clampTableDim(node.rows, 3);
      const cols = clampTableDim(node.cols, 3);
      const cells = normalizeCells(node.cells, rows, cols);
      const headerH = 18;
      const gridW = w - TABLE_PAD * 2;
      const gridH = h - TABLE_PAD * 2 - headerH;
      const cellW = gridW / cols;
      const cellH = gridH / rows;

      const body = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      body.setAttribute("class", "node-body");
      body.setAttribute("width", w);
      body.setAttribute("height", h);
      body.setAttribute("rx", 6);
      body.setAttribute("fill", "#ffffff");
      body.setAttribute("stroke", "#475569");
      body.setAttribute("stroke-width", 1.5);
      g.appendChild(body);

      const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
      title.setAttribute("x", TABLE_PAD);
      title.setAttribute("y", 14);
      title.setAttribute("font-size", "11");
      title.setAttribute("font-family", "sans-serif");
      title.setAttribute("font-weight", "600");
      title.setAttribute("fill", "#334155");
      title.textContent = truncate(node.label || "Table", 18);
      g.appendChild(title);

      const gx = TABLE_PAD;
      const gy = TABLE_PAD + headerH;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = gx + c * cellW;
          const y = gy + r * cellH;
          const cell = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          cell.setAttribute("x", x);
          cell.setAttribute("y", y);
          cell.setAttribute("width", cellW);
          cell.setAttribute("height", cellH);
          cell.setAttribute("fill", r === 0 ? "#f1f5f9" : "#fff");
          cell.setAttribute("stroke", "#94a3b8");
          cell.setAttribute("stroke-width", 1);
          g.appendChild(cell);

          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.setAttribute("x", x + cellW / 2);
          t.setAttribute("y", y + cellH / 2 + 4);
          t.setAttribute("text-anchor", "middle");
          t.setAttribute("font-size", "10");
          t.setAttribute("font-family", "sans-serif");
          t.setAttribute("fill", "#334155");
          t.textContent = truncate(cells[r][c] || "", Math.max(4, Math.floor(cellW / 7)));
          g.appendChild(t);
        }
      }
    }

    function renderNodes() {
      nodesLayer.innerHTML = "";
      for (const node of contentNodes()) {
        const { w, h } = nodeSize(node);
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node-group" + (state.selectedNodes.has(node.id) ? " selected" : ""));
        g.setAttribute("transform", `translate(${node.x},${node.y})`);
        g.dataset.id = node.id;

        if (node.type === "textbox") {
          const measured = measureTextbox(node.label);
          const body = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          body.setAttribute("class", "node-body");
          body.setAttribute("width", w);
          body.setAttribute("height", h);
          body.setAttribute("rx", 6);
          body.setAttribute("fill", "#fffbeb");
          body.setAttribute("stroke", "#d97706");
          body.setAttribute("stroke-width", 1.5);
          g.appendChild(body);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", w / 2);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "12");
          text.setAttribute("font-family", "sans-serif");
          text.setAttribute("fill", "#92400e");
          const startY = TEXT_PAD_Y + TEXT_LINE_H * 0.75;
          measured.lines.forEach((line, i) => {
            const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
            tspan.setAttribute("x", w / 2);
            tspan.setAttribute("y", startY + i * TEXT_LINE_H);
            tspan.textContent = line || " ";
            text.appendChild(tspan);
          });
          g.appendChild(text);
        } else if (node.type === "table") {
          renderTableNode(g, node, w, h);
        } else {
          const hit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          hit.setAttribute("class", "node-hit");
          hit.setAttribute("width", w);
          hit.setAttribute("height", h);
          hit.setAttribute("rx", 8);
          hit.setAttribute("fill", "#f8fafc");
          hit.setAttribute("stroke", "#cbd5e1");
          hit.setAttribute("stroke-width", 1.5);
          g.appendChild(hit);

          const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
          use.setAttribute("href", `#icon-${node.type}`);
          use.setAttribute("x", (w - 40) / 2);
          use.setAttribute("y", 4);
          use.setAttribute("width", 40);
          use.setAttribute("height", 40);
          g.appendChild(use);

          const body = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          body.setAttribute("class", "node-body");
          body.setAttribute("width", w);
          body.setAttribute("height", h);
          body.setAttribute("rx", 8);
          body.setAttribute("fill", "none");
          body.setAttribute("stroke", "transparent");
          body.setAttribute("stroke-width", 2);
          g.appendChild(body);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", w / 2);
          text.setAttribute("y", h - 8);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "11");
          text.setAttribute("font-family", "sans-serif");
          text.setAttribute("font-weight", "600");
          text.setAttribute("fill", "#334155");
          text.textContent = truncate(node.label || labelFor(node.type), 12);
          g.appendChild(text);
        }

        if (node.description) {
          const badge = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          badge.setAttribute("cx", w - 8);
          badge.setAttribute("cy", 8);
          badge.setAttribute("r", 4);
          badge.setAttribute("fill", "#2563eb");
          g.appendChild(badge);
        }

        g.addEventListener("mousedown", (e) => onNodeMouseDown(e, node));
        nodesLayer.appendChild(g);
      }
    }

    function cellsToText(cells) {
      return (cells || []).map((row) => (row || []).join(";")).join("\n");
    }

    function textToCells(text, rows, cols) {
      const lines = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const out = makeEmptyCells(rows, cols);
      for (let r = 0; r < rows; r++) {
        const parts = (lines[r] || "").split(";");
        for (let c = 0; c < cols; c++) {
          out[r][c] = parts[c] != null ? parts[c] : "";
        }
      }
      return out;
    }

    function renderProps() {
      const nCount = state.selectedNodes.size;
      const lCount = state.selectedLinks.size;

      if (nCount === 0 && lCount === 0) {
        propsBody.className = "props-body empty";
        propsBody.textContent = "Select a device, frame, table, or link";
        return;
      }

      if (nCount + lCount > 1) {
        propsBody.className = "props-body";
        const parts = [];
        if (nCount) parts.push(`${nCount} item${nCount > 1 ? "s" : ""}`);
        if (lCount) parts.push(`${lCount} link${lCount > 1 ? "s" : ""}`);
        propsBody.innerHTML = `
          <div class="field">
            <label>Selection</label>
            <div class="meta">${parts.join(", ")} selected</div>
          </div>
          <div class="field">
            <label>Hint</label>
            <div class="meta">Drag to move together. Delete removes all selected.</div>
          </div>
        `;
        return;
      }

      if (nCount === 1) {
        const id = [...state.selectedNodes][0];
        const node = findNode(id);
        if (!node) {
          propsBody.className = "props-body empty";
          propsBody.textContent = "Select a device or textbox";
          return;
        }
        const isText = node.type === "textbox";
        const flame = isFlame(node);
        const table = isTable(node);
        const memberCount = flame ? (membershipMap().get(node.id) || []).length : 0;
        const color = frameColor(node);
        propsBody.className = "props-body";
        propsBody.innerHTML = `
          <div class="field">
            <label>Type</label>
            <div class="meta">${labelFor(node.type)}</div>
          </div>
          ${
            flame
              ? `<div class="field"><label>Members</label><div class="meta">${memberCount} device${memberCount === 1 ? "" : "s"} inside</div></div>
                 <div class="field">
                   <label>Color</label>
                   <div class="color-swatches" id="frameColors">
                     ${FRAME_COLORS.map((c) =>
                       `<button type="button" class="color-swatch${c.id === color.id ? " active" : ""}" data-color="${c.id}" style="background:${c.stroke}" title="${c.id}"></button>`
                     ).join("")}
                   </div>
                 </div>`
              : ""
          }
          ${
            table
              ? `<div class="field">
                   <label>Size</label>
                   <div class="row">
                     <input type="number" id="propRows" min="${TABLE_MIN_DIM}" max="${TABLE_MAX_DIM}" value="${clampTableDim(node.rows, 3)}" />
                     <input type="number" id="propCols" min="${TABLE_MIN_DIM}" max="${TABLE_MAX_DIM}" value="${clampTableDim(node.cols, 3)}" />
                   </div>
                   <div class="meta">Rows × columns</div>
                 </div>
                 <div class="field">
                   <label>Cells (; separated)</label>
                   <textarea id="propCells" class="cells-area" placeholder="A1;B1&#10;A2;B2">${escapeHtml(cellsToText(normalizeCells(node.cells, clampTableDim(node.rows, 3), clampTableDim(node.cols, 3))))}</textarea>
                 </div>`
              : ""
          }
          <div class="field">
            <label>${isText ? "Text" : flame ? "Title" : "Label"}</label>
            ${
              isText
                ? `<textarea id="propLabel" class="label-area" placeholder="Text…">${escapeHtml(node.label || "")}</textarea>`
                : `<input type="text" id="propLabel" value="${escapeAttr(node.label || "")}" placeholder="Name" />`
            }
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="propDesc" placeholder="Notes…">${escapeHtml(node.description || "")}</textarea>
          </div>
        `;
        const labelEl = document.getElementById("propLabel");
        const descEl = document.getElementById("propDesc");
        labelEl.addEventListener("input", () => {
          node.label = labelEl.value;
          renderVisualOnly();
        });
        descEl.addEventListener("input", () => {
          node.description = descEl.value;
          renderVisualOnly();
        });
        if (flame) {
          document.getElementById("frameColors").addEventListener("click", (e) => {
            const btn = e.target.closest(".color-swatch");
            if (!btn) return;
            node.color = btn.dataset.color;
            render();
          });
        }
        if (table) {
          const rowsEl = document.getElementById("propRows");
          const colsEl = document.getElementById("propCols");
          const cellsEl = document.getElementById("propCells");
          const resizeTable = () => {
            const rows = clampTableDim(rowsEl.value, 3);
            const cols = clampTableDim(colsEl.value, 3);
            rowsEl.value = rows;
            colsEl.value = cols;
            node.rows = rows;
            node.cols = cols;
            node.cells = normalizeCells(textToCells(cellsEl.value, rows, cols), rows, cols);
            cellsEl.value = cellsToText(node.cells);
            renderVisualOnly();
          };
          rowsEl.addEventListener("change", resizeTable);
          colsEl.addEventListener("change", resizeTable);
          cellsEl.addEventListener("input", () => {
            const rows = clampTableDim(node.rows, 3);
            const cols = clampTableDim(node.cols, 3);
            node.cells = textToCells(cellsEl.value, rows, cols);
            renderVisualOnly();
          });
        }
        return;
      }

      if (lCount === 1) {
        const id = [...state.selectedLinks][0];
        const link = findLink(id);
        if (!link) {
          propsBody.className = "props-body empty";
          propsBody.textContent = "Select a device or textbox";
          return;
        }
        const a = findNode(link.from);
        const b = findNode(link.to);
        const lineStyle = link.lineStyle === "dotted" ? "dotted" : "solid";
        const arrow = link.arrow === "end" || link.arrow === "both" ? link.arrow : "none";
        propsBody.className = "props-body";
        propsBody.innerHTML = `
          <div class="field">
            <label>Connection</label>
            <div class="meta">${escapeHtml(a?.label || labelFor(a?.type))} → ${escapeHtml(b?.label || labelFor(b?.type))}</div>
          </div>
          <div class="field">
            <label>Line style</label>
            <select id="propLineStyle">
              <option value="solid"${lineStyle === "solid" ? " selected" : ""}>Solid</option>
              <option value="dotted"${lineStyle === "dotted" ? " selected" : ""}>Dotted</option>
            </select>
          </div>
          <div class="field">
            <label>Arrow</label>
            <select id="propArrow">
              <option value="none"${arrow === "none" ? " selected" : ""}>None</option>
              <option value="end"${arrow === "end" ? " selected" : ""}>End arrow</option>
              <option value="both"${arrow === "both" ? " selected" : ""}>Both ends</option>
            </select>
          </div>
          <div class="field">
            <label>Curve</label>
            <div class="meta">Drag the blue handle on the line to bend it. Double-click the handle to straighten.</div>
            ${normalizeCurve(link.curve) ? `<button type="button" id="propStraighten" class="btn-sm" style="margin-top:6px">Straighten</button>` : ""}
          </div>
          <div class="field">
            <label>Hint</label>
            <div class="meta">Press Delete to remove this link</div>
          </div>
        `;
        document.getElementById("propLineStyle").addEventListener("change", (e) => {
          link.lineStyle = e.target.value === "dotted" ? "dotted" : "solid";
          renderVisualOnly();
        });
        document.getElementById("propArrow").addEventListener("change", (e) => {
          const v = e.target.value;
          link.arrow = v === "end" || v === "both" ? v : "none";
          renderVisualOnly();
        });
        const btnStraight = document.getElementById("propStraighten");
        if (btnStraight) {
          btnStraight.addEventListener("click", () => {
            link.curve = null;
            render();
            showStatus("Link straightened");
          });
        }
      }
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function selectNode(id, additive) {
      if (!additive) {
        state.selectedNodes.clear();
        state.selectedLinks.clear();
        state.selectedNodes.add(id);
      } else {
        if (state.selectedNodes.has(id)) state.selectedNodes.delete(id);
        else state.selectedNodes.add(id);
      }
      render();
    }

    function selectLink(id, additive) {
      if (!additive) {
        state.selectedNodes.clear();
        state.selectedLinks.clear();
        state.selectedLinks.add(id);
      } else {
        if (state.selectedLinks.has(id)) state.selectedLinks.delete(id);
        else state.selectedLinks.add(id);
      }
      render();
    }

    function clearSelection() {
      state.selectedNodes.clear();
      state.selectedLinks.clear();
      render();
    }

    // --- Interaction ---
    function svgPoint(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      return {
        x: (sx - state.view.x) / state.view.scale,
        y: (sy - state.view.y) / state.view.scale,
        sx,
        sy,
      };
    }

    function onNodeMouseDown(e, node) {
      e.stopPropagation();
      e.preventDefault();

      if (e.button === 1 || (e.button === 0 && state.spaceDown)) {
        startPan(e);
        return;
      }
      if (e.button !== 0) return;

      if (state.mode === "connect") {
        if (!isConnectable(node)) {
          showStatus("Cannot connect a Frame");
          return;
        }
        if (!state.connectFrom) {
          state.connectFrom = node.id;
          selectNode(node.id, false);
          showStatus("Now click the target device");
          modeHint.textContent = "Connect mode — click target device";
        } else if (state.connectFrom === node.id) {
          showStatus("Pick a different device");
        } else {
          const exists = state.links.some(
            (l) =>
              (l.from === state.connectFrom && l.to === node.id) ||
              (l.from === node.id && l.to === state.connectFrom)
          );
          if (!exists) {
            state.links.push({
              id: uid(),
              from: state.connectFrom,
              to: node.id,
              lineStyle: "solid",
              arrow: "none",
              curve: null,
            });
            showStatus("Connected");
          } else {
            showStatus("Already connected");
          }
          state.connectFrom = null;
          selectNode(node.id, false);
          modeHint.textContent = "Connect mode — click first device, then second";
          render();
        }
        return;
      }

      if (state.mode === "place") return;

      const additive = isModClick(e);
      if (additive) {
        selectNode(node.id, true);
      } else if (!state.selectedNodes.has(node.id)) {
        selectNode(node.id, false);
      } else {
        state.selectedLinks.clear();
        renderVisualOnly();
        renderProps();
      }

      if (additive && !state.selectedNodes.has(node.id)) return;

      const p = svgPoint(e);
      const moveIds = collectDragIds(node.id);
      const origins = {};
      for (const id of moveIds) {
        const n = findNode(id);
        if (n) origins[id] = { x: n.x, y: n.y, w: n.w, h: n.h };
      }
      state.drag = {
        startX: p.x,
        startY: p.y,
        origins,
        primaryId: node.id,
      };
    }

    function startPan(e) {
      const p = svgPoint(e);
      state.pan = {
        startSx: p.sx,
        startSy: p.sy,
        originX: state.view.x,
        originY: state.view.y,
      };
      updateCursor();
    }

    canvas.addEventListener("mousedown", (e) => {
      if (e.button === 1 || (e.button === 0 && state.spaceDown)) {
        e.preventDefault();
        startPan(e);
        return;
      }
      if (e.button !== 0) return;

      if (e.target !== canvas && e.target.closest(".node-group, .flame-group, .link-hit, .link-line, .link-handle")) return;

      if (state.mode === "place" && state.placeType) {
        const p = svgPoint(e);
        const node = createNodeAt(state.placeType, p.x, p.y);
        if (!node) return;
        selectNode(node.id, false);
        setMode("select");
        showStatus(`Added ${labelFor(node.type)}`);
        return;
      }

      if (state.mode === "connect") {
        state.connectFrom = null;
        modeHint.textContent = "Connect mode — click first device, then second";
        clearSelection();
        return;
      }

      // Empty canvas drag pans in select mode
      if (state.mode === "select") {
        startPan(e);
        clearSelection();
        return;
      }

      clearSelection();
    });

    canvas.addEventListener(
      "wheel",
      (e) => {
        e.preventDefault();
        const p = svgPoint(e);
        const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        zoomAt(p.sx, p.sy, state.view.scale * factor);
      },
      { passive: false }
    );

    canvas.addEventListener("dragover", (e) => {
      if (e.dataTransfer.types.includes("application/x-network-node") || e.dataTransfer.types.includes("text/plain")) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "copy";
      }
    });

    canvas.addEventListener("drop", (e) => {
      e.preventDefault();
      const type =
        e.dataTransfer.getData("application/x-network-node") ||
        e.dataTransfer.getData("text/plain");
      if (!type || !DEVICE_TYPES.some((d) => d.type === type)) return;
      const p = svgPoint(e);
      const node = createNodeAt(type, p.x, p.y);
      if (!node) return;
      selectNode(node.id, false);
      setMode("select");
      showStatus(`Added ${labelFor(node.type)}`);
    });

    window.addEventListener("mousemove", (e) => {
      if (state.pan) {
        const p = svgPoint(e);
        state.view.x = state.pan.originX + (p.sx - state.pan.startSx);
        state.view.y = state.pan.originY + (p.sy - state.pan.startSy);
        applyView();
        return;
      }
      if (state.curveDrag) {
        const p = svgPoint(e);
        const link = findLink(state.curveDrag.linkId);
        if (!link) return;
        const handle = {
          x: state.curveDrag.startHandle.x + (p.x - state.curveDrag.origin.x),
          y: state.curveDrag.startHandle.y + (p.y - state.curveDrag.origin.y),
        };
        const a = findNode(link.from);
        const b = findNode(link.to);
        if (!a || !b) return;
        // Approximate endpoints using previous curve or centers for control conversion
        const prev = normalizeCurve(link.curve);
        let p1, p2;
        if (prev) {
          p1 = boundaryPoint(a, prev.x, prev.y, 1.5);
          p2 = boundaryPoint(b, prev.x, prev.y, 1.5);
        } else {
          const ca = nodeCenter(a);
          const cb = nodeCenter(b);
          p1 = boundaryPoint(a, cb.x, cb.y, 1.5);
          p2 = boundaryPoint(b, ca.x, ca.y, 1.5);
        }
        link.curve = curveFromHandle(p1, p2, handle);
        // Refine endpoints toward new control and recompute control once
        p1 = boundaryPoint(a, link.curve.x, link.curve.y, 1.5);
        p2 = boundaryPoint(b, link.curve.x, link.curve.y, 1.5);
        link.curve = curveFromHandle(p1, p2, handle);
        renderVisualOnly();
        return;
      }
      if (!state.drag) return;
      const p = svgPoint(e);
      const dx = p.x - state.drag.startX;
      const dy = p.y - state.drag.startY;
      for (const [id, origin] of Object.entries(state.drag.origins)) {
        const node = findNode(id);
        if (!node) continue;
        node.x = origin.x + dx;
        node.y = origin.y + dy;
      }
      const draggingFlame = Object.keys(state.drag.origins).some((id) => isFlame(findNode(id)));
      if (draggingFlame) {
        renderVisualOnly();
      } else {
        layoutFlames();
        renderVisualOnly();
      }
    });

    window.addEventListener("mouseup", () => {
      if (state.pan) {
        state.pan = null;
        updateCursor();
      }
      if (state.curveDrag) {
        state.curveDrag = null;
        render();
      }
      if (state.drag) {
        state.drag = null;
        render();
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !e.target.matches("input, textarea, select")) {
        e.preventDefault();
        state.spaceDown = true;
        updateCursor();
      }
      if (e.key === "Delete" || e.key === "Backspace") {
        if (e.target.matches("input, textarea, select")) return;
        e.preventDefault();
        deleteSelected();
      }
      if (e.key === "Escape") {
        setMode("select");
        clearSelection();
      }
      if ((e.key === "=" || e.key === "+") && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        zoomBy(1.1);
      }
      if ((e.key === "-" || e.key === "_") && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        zoomBy(1 / 1.1);
      }
      if (e.key === "0" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        resetView();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        state.spaceDown = false;
        updateCursor();
      }
    });

    // Prevent middle-click autoscroll
    canvas.addEventListener("auxclick", (e) => {
      if (e.button === 1) e.preventDefault();
    });

    document.getElementById("btnSelect").addEventListener("click", () => setMode("select"));
    document.getElementById("btnConnect").addEventListener("click", () => setMode("connect"));
    document.getElementById("btnDelete").addEventListener("click", deleteSelected);
    document.getElementById("btnZoomIn").addEventListener("click", () => zoomBy(1.1));
    document.getElementById("btnZoomOut").addEventListener("click", () => zoomBy(1 / 1.1));
    document.getElementById("btnZoomReset").addEventListener("click", resetView);

    function deleteSelected() {
      if (!hasSelection()) {
        showStatus("Nothing selected");
        return;
      }
      const nodeIds = new Set(state.selectedNodes);
      const linkIds = new Set(state.selectedLinks);
      const count = nodeIds.size + linkIds.size;

      if (nodeIds.size) {
        state.nodes = state.nodes.filter((n) => !nodeIds.has(n.id));
        state.links = state.links.filter(
          (l) => !nodeIds.has(l.from) && !nodeIds.has(l.to) && !linkIds.has(l.id)
        );
      } else {
        state.links = state.links.filter((l) => !linkIds.has(l.id));
      }

      clearSelection();
      showStatus(`Deleted ${count} item${count > 1 ? "s" : ""}`);
    }

    // --- Filename helper ---
    function askFilename(defaultBase, ext) {
      const raw = prompt(`File name (.${ext}):`, defaultBase);
      if (raw == null) return null;
      let name = raw.trim();
      if (!name) return null;
      name = name.replace(/[\\/:*?"<>|]/g, "-");
      name = name.replace(/\.+$/, "");
      const lower = name.toLowerCase();
      if (lower.endsWith("." + ext)) {
        name = name.slice(0, -(ext.length + 1));
      }
      name = name.trim();
      if (!name) return null;
      return name + "." + ext;
    }

    // --- Save / Load JSON ---
    document.getElementById("btnSave").addEventListener("click", saveDiagram);
    document.getElementById("btnLoad").addEventListener("click", () => {
      document.getElementById("fileLoad").value = "";
      document.getElementById("fileLoad").click();
    });
    document.getElementById("fileLoad").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) loadDiagram(file);
    });

    function saveDiagram() {
      const filename = askFilename("network-diagram", "json");
      if (!filename) {
        showStatus("Save cancelled");
        return;
      }
      const data = {
        version: 2,
        nodes: state.nodes,
        links: state.links,
        nextId: state.nextId,
        view: state.view,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      downloadBlob(blob, filename);
      showStatus("Saved " + filename);
    }

    function loadDiagram(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || !Array.isArray(data.nodes) || !Array.isArray(data.links)) {
            showStatus("Invalid diagram file");
            return;
          }
          const validTypes = new Set(DEVICE_TYPES.map((d) => d.type));
          const nodes = data.nodes
            .filter((n) => n && n.id && validTypes.has(n.type) && typeof n.x === "number" && typeof n.y === "number")
            .map((n) => {
              const node = {
                id: String(n.id),
                type: n.type,
                x: n.x,
                y: n.y,
                label: n.label != null ? String(n.label) : labelFor(n.type),
                description: n.description != null ? String(n.description) : "",
              };
              if (n.type === "flame") {
                node.w = typeof n.w === "number" ? n.w : FLAME_MIN_W;
                node.h = typeof n.h === "number" ? n.h : FLAME_MIN_H;
                node.color = FRAME_COLORS.some((c) => c.id === n.color) ? n.color : "orange";
              }
              if (n.type === "table") {
                node.rows = clampTableDim(n.rows, 3);
                node.cols = clampTableDim(n.cols, 3);
                node.cells = normalizeCells(n.cells, node.rows, node.cols);
              }
              return node;
            });
          const nodeIds = new Set(nodes.map((n) => n.id));
          const links = data.links
            .filter((l) => l && l.id && nodeIds.has(l.from) && nodeIds.has(l.to))
            .map((l) => ({
              id: String(l.id),
              from: String(l.from),
              to: String(l.to),
              lineStyle: l.lineStyle === "dotted" ? "dotted" : "solid",
              arrow: l.arrow === "end" || l.arrow === "both" ? l.arrow : "none",
              curve: normalizeCurve(l.curve),
            }));

          let nextId = Number(data.nextId) || 1;
          for (const n of nodes) {
            const m = String(n.id).match(/^n(\d+)$/);
            if (m) nextId = Math.max(nextId, Number(m[1]) + 1);
          }
          for (const l of links) {
            const m = String(l.id).match(/^n(\d+)$/);
            if (m) nextId = Math.max(nextId, Number(m[1]) + 1);
          }

          state.nodes = nodes;
          state.links = links;
          state.nextId = nextId;
          state.selectedNodes.clear();
          state.selectedLinks.clear();
          state.connectFrom = null;
          state.drag = null;
          state.curveDrag = null;
          state.pan = null;
          if (data.view && typeof data.view.scale === "number") {
            state.view = {
              x: Number(data.view.x) || 0,
              y: Number(data.view.y) || 0,
              scale: Math.min(VIEW_MAX, Math.max(VIEW_MIN, data.view.scale)),
            };
          } else {
            state.view = { x: 0, y: 0, scale: 1 };
          }
          applyView();
          setMode("select");
          render();
          showStatus("Loaded diagram");
        } catch {
          showStatus("Failed to load file");
        }
      };
      reader.onerror = () => showStatus("Failed to read file");
      reader.readAsText(file);
    }

    // --- Export helpers ---
    function diagramBounds() {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const node of state.nodes) {
        const { w, h } = nodeSize(node);
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x + w);
        maxY = Math.max(maxY, node.y + h);
      }
      if (!Number.isFinite(minX)) {
        return { minX: 0, minY: 0, width: 200, height: 200 };
      }
      const pad = 40;
      minX -= pad;
      minY -= pad;
      maxX += pad;
      maxY += pad;
      return {
        minX,
        minY,
        width: Math.max(200, maxX - minX),
        height: Math.max(200, maxY - minY),
      };
    }

    function renderExportCanvas(callback) {
      if (state.nodes.length === 0) {
        showStatus("Nothing to export");
        return;
      }
      layoutFlames();
      const { minX, minY, width, height } = diagramBounds();
      const clone = canvas.cloneNode(true);
      clone.setAttribute("width", width);
      clone.setAttribute("height", height);
      clone.setAttribute("viewBox", `${minX} ${minY} ${width} ${height}`);
      clone.style.background = "#ffffff";
      const worldClone = clone.querySelector("#world");
      if (worldClone) worldClone.removeAttribute("transform");

      clone.querySelectorAll(".link-line").forEach((el) => {
        el.setAttribute("stroke", el.classList.contains("selected") ? "#2563eb" : "#475569");
        el.setAttribute("stroke-width", el.classList.contains("selected") ? "3" : "2");
        el.setAttribute("fill", "none");
      });
      clone.querySelectorAll(".link-hit, .link-handle").forEach((el) => el.remove());
      clone.querySelectorAll(".node-group.selected .node-body, .flame-group.selected .node-body").forEach((el) => {
        el.setAttribute("stroke", "#2563eb");
        el.setAttribute("stroke-width", "2.5");
      });

      const serializer = new XMLSerializer();
      let svgStr = serializer.serializeToString(clone);
      if (!svgStr.includes("xmlns=")) {
        svgStr = svgStr.replace("<svg", '<svg xmlns="http://www.w3.org/2000/svg"');
      }

      const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const scale = 2;
        const c = document.createElement("canvas");
        c.width = width * scale;
        c.height = height * scale;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        callback(c, width, height);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        showStatus("Export failed");
      };
      img.src = url;
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById("btnExportPng").addEventListener("click", exportPng);
    document.getElementById("btnExportPdf").addEventListener("click", exportPdf);

    function exportPng() {
      const filename = askFilename("network-diagram", "png");
      if (!filename) {
        showStatus("Export cancelled");
        return;
      }
      renderExportCanvas((c) => {
        c.toBlob((pngBlob) => {
          if (!pngBlob) {
            showStatus("Export failed");
            return;
          }
          downloadBlob(pngBlob, filename);
          showStatus("Exported " + filename);
        }, "image/png");
      });
    }

    function exportPdf() {
      const filename = askFilename("network-diagram", "pdf");
      if (!filename) {
        showStatus("Export cancelled");
        return;
      }
      renderExportCanvas((c, width, height) => {
        const dataUrl = c.toDataURL("image/jpeg", 0.92);
        const jpegBase64 = dataUrl.split(",")[1];
        const jpegBytes = base64ToBytes(jpegBase64);
        const pdfBlob = buildPdfFromJpeg(jpegBytes, c.width, c.height, width, height);
        downloadBlob(pdfBlob, filename);
        showStatus("Exported " + filename);
      });
    }

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function concatBytes(...parts) {
      let len = 0;
      for (const p of parts) len += p.length;
      const out = new Uint8Array(len);
      let off = 0;
      for (const p of parts) {
        out.set(p, off);
        off += p.length;
      }
      return out;
    }

    function buildPdfFromJpeg(jpegBytes, imgW, imgH, pageW, pageH) {
      const enc = new TextEncoder();
      const header = enc.encode("%PDF-1.4\n");
      const objs = [];

      objs.push(enc.encode("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n"));
      objs.push(enc.encode("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n"));
      objs.push(
        enc.encode(
          `3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Contents 4 0 R /Resources << /XObject << /Im0 5 0 R >> >> >>\nendobj\n`
        )
      );

      const stream = `q\n${pageW.toFixed(2)} 0 0 ${pageH.toFixed(2)} 0 0 cm\n/Im0 Do\nQ\n`;
      const streamBytes = enc.encode(stream);
      objs.push(
        concatBytes(
          enc.encode(`4 0 obj\n<< /Length ${streamBytes.length} >>\nstream\n`),
          streamBytes,
          enc.encode("\nendstream\nendobj\n")
        )
      );

      objs.push(
        concatBytes(
          enc.encode(
            `5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`
          ),
          jpegBytes,
          enc.encode("\nendstream\nendobj\n")
        )
      );

      let pdf = header;
      const xrefOffsets = [0];
      let offset = header.length;
      for (const obj of objs) {
        xrefOffsets.push(offset);
        pdf = concatBytes(pdf, obj);
        offset += obj.length;
      }

      const xrefStart = offset;
      let xref = `xref\n0 ${objs.length + 1}\n`;
      xref += "0000000000 65535 f \n";
      for (let i = 1; i <= objs.length; i++) {
        xref += String(xrefOffsets[i]).padStart(10, "0") + " 00000 n \n";
      }
      xref += `trailer\n<< /Size ${objs.length + 1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF\n`;

      return new Blob([concatBytes(pdf, enc.encode(xref))], { type: "application/pdf" });
    }

    // Init
    buildIconDefs();
    buildPalette();
    applyView();
    setMode("select");
    render();
  </script>
</body>
</html>
